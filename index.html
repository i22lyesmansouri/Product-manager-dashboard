<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Electro Jazera</title>

<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>

<style>
html,body{margin:0;font-family:Arial,sans-serif;background:#fff;color:#111}
header{background:#fff;padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);position:sticky;top:0}
.logo{height:40px}
.search{padding:.4rem .6rem;border:1px solid #ccc;border-radius:6px;width:160px}
main{padding:1rem}
#productList{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem}
.product{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.08);cursor:pointer}
.product img{width:100%;height:160px;object-fit:cover}
.product-info{display:flex;padding:.6rem .7rem;font-weight:600}
.product-info .name{flex:2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-info .price{flex:1;text-align:right}
#addBtn{position:fixed;bottom:20px;right:20px;background:#ffcc00;border:none;width:55px;height:55px;border-radius:50%;font-size:26px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center}
.modal-content{background:#fff;padding:1rem;border-radius:12px;width:100%;max-width:420px}
.field{margin:.5rem 0}
.field input{width:100%;padding:.6rem;border:1px solid #ccc;border-radius:6px}
button{padding:.5rem .8rem;border:none;border-radius:8px;cursor:pointer}
.save-btn{background:#28a745;color:#fff}
.delete-btn{background:#dc3545;color:#fff;margin-left:10px}
</style>
</head>

<body>

<header>
<img src="icon-192.png" class="logo">
<input type="text" id="searchInput" class="search" placeholder="Search...">
</header>

<main>
<div id="productList"></div>
</main>

<button id="addBtn">+</button>

<div id="modal" class="modal">
<div class="modal-content">
<h3 id="modalTitle"></h3>
<input type="hidden" id="editId">

<div class="field"><input type="text" id="name" placeholder="Name"></div>
<div class="field"><input type="text" id="description" placeholder="Description"></div>
<div class="field"><input type="number" id="buyPrice" placeholder="Buy Price"></div>
<div class="field"><input type="number" id="sellPrice" placeholder="Sell Price"></div>
<div class="field"><input type="number" id="bulkPrice" placeholder="Bulk Price"></div>
<div class="field"><input type="number" id="stock" placeholder="Stock"></div>
<input type="file" id="image">

<div style="margin-top:10px;">
<button id="saveBtn" class="save-btn">Save</button>
<button id="deleteBtn" class="delete-btn">Delete</button>
</div>

</div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyARuVXWInC8tgTOZofjueorMZfw3XVGLNE",
  authDomain: "electrojazera-91842.firebaseapp.com",
  projectId: "electrojazera-91842",
  storageBucket: "electrojazera-91842.firebasestorage.app",
  messagingSenderId: "782045343179",
  appId: "1:782045343179:web:7d692fa678a82b46a7da4e"
});

const db = firebase.firestore();
const productsRef = db.collection("products");

function formatPrice(v){
  const n=parseFloat(v||0);
  return Number.isInteger(n)?n:n.toFixed(2);
}

function renderProducts(filter=""){
  productsRef.get().then(snapshot=>{
    const list=document.getElementById("productList");
    list.innerHTML="";
    snapshot.forEach(doc=>{
      const p=doc.data();
      p.id=doc.id;

      if((p.name||"").toLowerCase().includes(filter) ||
         (p.description||"").toLowerCase().includes(filter)){

        const card=document.createElement("div");
        card.className="product";
        card.innerHTML=`
        <img src="${p.image||''}">
        <div class="product-info">
          <span class="name">${p.name}</span>
          <span class="price">${formatPrice(p.sellPrice)}</span>
        </div>`;
        card.onclick=()=>openEdit(p);
        list.appendChild(card);
      }
    });
  });
}

function openEdit(p){
  document.getElementById("modalTitle").innerText="Product";
  document.getElementById("editId").value=p.id||"";
  name.value=p.name||"";
  description.value=p.description||"";
  buyPrice.value=p.buyPrice||"";
  sellPrice.value=p.sellPrice||"";
  bulkPrice.value=p.bulkPrice||"";
  stock.value=p.stock||"";
  modal.style.display="flex";
}

function closeModal(){
  modal.style.display="none";
}

addBtn.onclick=()=>{
  document.getElementById("editId").value="";
  document.querySelectorAll("#modal input").forEach(i=>i.value="");
  modal.style.display="flex";
};

saveBtn.onclick=()=>{
  const id=editId.value;
  const product={
    name:name.value,
    description:description.value,
    buyPrice:parseFloat(buyPrice.value)||0,
    sellPrice:parseFloat(sellPrice.value)||0,
    bulkPrice:parseFloat(bulkPrice.value)||0,
    stock:parseInt(stock.value)||0
  };

  const file=image.files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=()=>{product.image=reader.result;saveProduct(id,product);};
    reader.readAsDataURL(file);
  }else{
    saveProduct(id,product);
  }
};

function saveProduct(id,product){
  if(id){
    productsRef.doc(id).set(product).then(()=>{closeModal();renderProducts();});
  }else{
    productsRef.add(product).then(()=>{closeModal();renderProducts();});
  }
}

deleteBtn.onclick=()=>{
  const id=editId.value;
  if(!id) return;
  if(confirm("Delete this product?")){
    productsRef.doc(id).delete().then(()=>{closeModal();renderProducts();});
  }
};

searchInput.addEventListener("input",e=>{
  renderProducts(e.target.value.toLowerCase());
});

window.onclick=e=>{
  if(e.target.id==="modal") closeModal();
};

renderProducts();
</script>

</body>
</html>
